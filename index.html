<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FACE PONG 3D — 4 PLAYER</title>
<style>
  * { font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE", cursive; }
  body { margin: 0; overflow: hidden; background: #000; color: #fff; }
  /* ---------- HUD ---------- */
  #hud { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: center; gap: 14px; padding: 14px; z-index: 10; pointer-events: none; flex-wrap: wrap; }
  .chip { padding: 8px 18px; border-radius: 20px; border: 3px solid; background: rgba(0,0,0,0.6); font-size: 18px; font-weight: bold; transition: transform .2s; }
  .chip.me { box-shadow: 0 0 18px currentColor; }
  .chip.dead { opacity: .35; filter: grayscale(1); }
  .chip .hearts { letter-spacing: 2px; }
  #status { position: fixed; bottom: 18px; left: 0; right: 0; text-align: center; font-size: 18px; z-index: 10; pointer-events: none; text-shadow: 0 0 8px #000; }
  #flash { position: fixed; inset: 0; pointer-events: none; z-index: 5; opacity: 0; background: radial-gradient(circle, transparent 40%, #f0f 100%); transition: opacity .4s; }
  #bigmsg { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 15; pointer-events: none; font-size: 64px; font-weight: bold; text-shadow: 0 0 30px currentColor; opacity: 0; transition: opacity .3s; text-align: center; }
  /* ---------- LOBBY ---------- */
  #lobby { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    background: linear-gradient(135deg, #1a0533, #001a4d 50%, #003322); }
  #lobby h1 { font-size: 58px; margin: 0; background: linear-gradient(90deg,#ff5e78,#ffd166,#6ee76e,#66c2ff,#c86bff); -webkit-background-clip: text; background-clip: text; color: transparent; animation: wiggle 1.2s ease-in-out infinite; }
  @keyframes wiggle { 0%,100% { transform: rotate(-2deg) scale(1); } 50% { transform: rotate(2deg) scale(1.04); } }
  #lobby h2 { margin: 0; font-size: 18px; color: #aab; font-weight: normal; }
  .card { background: rgba(255,255,255,0.07); border: 2px dashed rgba(255,255,255,0.35); border-radius: 22px; padding: 26px 34px; display: flex; flex-direction: column; align-items: center; gap: 14px; backdrop-filter: blur(6px); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button { font-size: 20px; font-weight: bold; padding: 12px 26px; border-radius: 999px; border: 3px solid #fff; cursor: pointer; color: #fff; background: linear-gradient(135deg,#ff5e78,#c86bff); transition: transform .1s; }
  button:hover { transform: scale(1.08) rotate(-1deg); }
  button.alt { background: linear-gradient(135deg,#66c2ff,#6ee76e); }
  button:disabled { opacity: .4; cursor: default; transform: none; }
  input { font-size: 20px; padding: 12px 16px; border-radius: 14px; border: 3px solid #fff; background: rgba(0,0,0,.4); color: #fff; text-align: center; width: 180px; }
  input::placeholder { color: #889; }
  #roomCode { font-size: 44px; letter-spacing: 12px; color: #ffd166; text-shadow: 0 0 16px #ffd166; }
  #playerList { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .pcard { border: 3px solid; border-radius: 16px; padding: 10px 20px; font-size: 20px; font-weight: bold; background: rgba(0,0,0,.4); }
  .pcard.empty { border-style: dotted; opacity: .35; font-weight: normal; }
  .hidden { display: none !important; }
  #lobbyStatus { color: #f88; min-height: 22px; }
</style>
</head>
<body>
<div id="hud"></div>
<div id="status"></div>
<div id="flash"></div>
<div id="bigmsg"></div>

<div id="lobby">
  <h1>FACE PONG 3D</h1>
  <h2>webcam battle arena · 2–4 players · last face standing wins</h2>
  <div class="card" id="menu">
    <input id="nameInput" placeholder="your name" maxlength="10">
    <div class="row">
      <button id="hostBtn">HOST PARTY</button>
      <span style="font-size:22px">or</span>
      <input id="joinInput" placeholder="CODE" maxlength="4" style="width:110px; text-transform:uppercase">
      <button id="joinBtn" class="alt">JOIN</button>
    </div>
    <div id="lobbyStatus"></div>
  </div>
  <div class="card hidden" id="waitRoom">
    <div>share this code with your friends:</div>
    <div id="roomCode"></div>
    <div id="playerList"></div>
    <button id="startBtn" class="hidden" disabled>START GAME</button>
    <div id="waitMsg" style="color:#aab">waiting for players...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ================= CONSTANTS =================
const R = 8;                 // arena half-width (square)
const H = 3;                 // arena half-height
const PAD_R = R - 0.6;       // paddle plane distance from center
const PADDLE = { w: 3, h: 2 };
const BALL_R = 0.35;
const BASE_SPEED = 12;
const MAX_LIVES = 5;
const SEAT_ANGLE = [0, Math.PI, Math.PI/2, -Math.PI/2];   // seat 0..3 wall directions
const SEAT_COLOR = [0x6ee76e, 0xff9f43, 0x66c2ff, 0xff5e9c];
const SEAT_CSS   = ["#6ee76e", "#ff9f43", "#66c2ff", "#ff5e9c"];

// ================= STATE =================
let peer, isHost = false, mySeat = 0, myName = "";
let conns = {};                    // host: peerId -> conn ; guest: { host: conn }
let players = [];                  // [{id, seat, name}] (id === "host" placeholder replaced w/ real ids)
let phase = "lobby";               // lobby | play | over
let lives = [0,0,0,0];
let pads = [[0,0],[0,0],[0,0],[0,0]];   // wall-local [u,v] per seat
let ball = new THREE.Vector3(), ballV = new THREE.Vector3();
let ballLive = false;
let myPad = { u: 0, v: 0 };
let localStream = null;

const $ = id => document.getElementById(id);
const code4 = () => Array.from({length:4}, () => "ABCDEFGHJKLMNPQRSTUVWXYZ"[Math.floor(Math.random()*24)]).join("");
const seatActive = s => players.some(p => p.seat === s);
const rotY = (v, a) => v.applyAxisAngle(new THREE.Vector3(0,1,0), a);

// ================= LOBBY / NETWORKING =================
async function getCam() {
  try { localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: false }); }
  catch (e) { $("lobbyStatus").textContent = "webcam blocked — playing faceless :("; }
}

function makePeer(id) {
  peer = new Peer(id ? "facepong-" + id : undefined);
  peer.on("error", e => $("lobbyStatus").textContent = "oops: " + e.type);
  peer.on("call", call => {                       // someone sends us their face
    call.answer(localStream || undefined);
    call.on("stream", s => attachFace(call.metadata?.seat ?? 0, s));
  });
}

$("hostBtn").onclick = async () => {
  isHost = true; mySeat = 0;
  myName = $("nameInput").value.trim() || "P1";
  $("menu").classList.add("hidden");
  $("waitRoom").classList.remove("hidden");
  $("startBtn").classList.remove("hidden");
  const code = code4();
  $("roomCode").textContent = code;
  await getCam();
  makePeer(code);
  peer.on("open", () => {
    players = [{ id: peer.id, seat: 0, name: myName }];
    renderPlayerList();
    peer.on("connection", c => {
      c.on("data", d => onData(c, d));
      c.on("close", () => dropPlayer(c.peer));
    });
  });
  $("startBtn").onclick = () => { if (players.length >= 2) hostStart(); };
};

$("joinBtn").onclick = async () => {
  const code = $("joinInput").value.trim().toUpperCase();
  if (code.length !== 4) return;
  myName = $("nameInput").value.trim() || "";
  $("lobbyStatus").textContent = "connecting...";
  await getCam();
  makePeer(null);
  peer.on("open", () => {
    const c = peer.connect("facepong-" + code);
    conns.host = c;
    c.on("open", () => c.send({ t: "hello", name: myName }));
    c.on("data", d => onData(c, d));
    c.on("close", () => { $("status").textContent = "host left :("; });
  });
};

function hostBroadcast(msg, except) {
  for (const id in conns) if (id !== except) conns[id].send(msg);
}

function dropPlayer(id) {
  delete conns[id];
  players = players.filter(p => p.id !== id);
  if (phase === "lobby") renderPlayerList();
  hostBroadcast({ t: "players", players });
  renderHUD();
}

function onData(c, d) {
  if (isHost) {
    if (d.t === "hello") {
      const usedSeats = players.map(p => p.seat);
      const seat = [0,1,2,3].find(s => !usedSeats.includes(s));
      if (seat === undefined || phase !== "lobby") { c.send({ t: "full" }); return; }
      const name = d.name || "P" + (seat + 1);
      conns[c.peer] = c;
      players.push({ id: c.peer, seat, name });
      c.send({ t: "welcome", seat, players });
      hostBroadcast({ t: "players", players }, c.peer);
      renderPlayerList();
    }
    if (d.t === "p") {
      const p = players.find(p => p.id === c.peer);
      if (p) pads[p.seat] = [d.u, d.v];
    }
  } else {
    if (d.t === "welcome") {
      mySeat = d.seat; players = d.players;
      myName = players.find(p => p.seat === mySeat).name;
      // video-call everyone already here
      if (localStream) players.forEach(p => {
        if (p.id !== peer.id) {
          const call = peer.call(p.id, localStream, { metadata: { seat: mySeat } });
          call.on("stream", s => attachFace(p.seat, s));
        }
      });
      $("menu").classList.add("hidden");
      $("waitRoom").classList.remove("hidden");
      $("roomCode").textContent = $("joinInput").value.trim().toUpperCase();
      $("waitMsg").textContent = "waiting for host to start...";
      setupSeatView();
      renderPlayerList();
    }
    if (d.t === "players") { players = d.players; renderPlayerList(); renderHUD(); }
    if (d.t === "full") $("lobbyStatus").textContent = "party is full / already started!";
    if (d.t === "start") { lives = d.lives; startPlay(); }
    if (d.t === "s") {
      d.pads.forEach((pp, s) => { if (s !== mySeat) pads[s] = pp; });
      ball.set(...d.ball); ballLive = d.live;
      if (d.lives.join() !== lives.join()) { lives = d.lives; renderHUD(); }
    }
    if (d.t === "hit") flash();
    if (d.t === "over") gameOver(d.winner);
  }
}

function renderPlayerList() {
  const el = $("playerList"); el.innerHTML = "";
  for (let s = 0; s < 4; s++) {
    const p = players.find(p => p.seat === s);
    const div = document.createElement("div");
    div.className = "pcard" + (p ? "" : " empty");
    div.style.borderColor = SEAT_CSS[s]; div.style.color = SEAT_CSS[s];
    div.textContent = p ? p.name + (p.seat === mySeat ? " (you)" : "") : "empty seat";
    el.appendChild(div);
  }
  if (isHost) {
    $("startBtn").disabled = players.length < 2;
    $("waitMsg").textContent = players.length < 2 ? "need at least 2 players..." : players.length + " players ready!";
  }
}

// ================= GAME FLOW =================
function hostStart() {
  lives = [0,0,0,0];
  players.forEach(p => lives[p.seat] = MAX_LIVES);
  hostBroadcast({ t: "start", lives });
  startPlay();
  setTimeout(serve, 2000);
}

function startPlay() {
  phase = "play";
  $("lobby").classList.add("hidden");
  renderHUD();
  bigMsg("GET READY!", SEAT_CSS[mySeat], 1500);
  $("status").textContent = "move your mouse to defend your wall!";
  setTimeout(() => $("status").textContent = "", 4000);
}

function serve() {
  if (phase !== "play") return;
  ball.set(0, 0, 0);
  const targets = players.filter(p => lives[p.seat] > 0);
  const t = targets[Math.floor(Math.random() * targets.length)];
  ballV.set((Math.random()-0.5)*4, (Math.random()-0.5)*3, BASE_SPEED);
  rotY(ballV, SEAT_ANGLE[t.seat]);
  ballLive = true;
}

function bigMsg(text, color, ms) {
  const el = $("bigmsg");
  el.textContent = text; el.style.color = color; el.style.opacity = 1;
  if (ms) setTimeout(() => el.style.opacity = 0, ms);
}

function flash() { const f = $("flash"); f.style.opacity = 1; setTimeout(() => f.style.opacity = 0, 150); }

function renderHUD() {
  const el = $("hud"); el.innerHTML = "";
  if (phase === "lobby") return;
  players.slice().sort((a,b) => a.seat - b.seat).forEach(p => {
    const div = document.createElement("div");
    div.className = "chip" + (p.seat === mySeat ? " me" : "") + (lives[p.seat] <= 0 ? " dead" : "");
    div.style.borderColor = SEAT_CSS[p.seat]; div.style.color = SEAT_CSS[p.seat];
    div.innerHTML = p.name + " <span class='hearts'>" + "♥".repeat(Math.max(0, lives[p.seat])) + "</span>";
    el.appendChild(div);
  });
}

function gameOver(winnerSeat) {
  phase = "over";
  ballLive = false;
  const w = players.find(p => p.seat === winnerSeat);
  bigMsg((w ? w.name : "???") + " WINS!", SEAT_CSS[winnerSeat]);
  if (winnerSeat === mySeat) $("status").textContent = "you are the last face standing!";
  if (isHost) {
    setTimeout(() => {
      $("status").innerHTML = "";
      const b = document.createElement("button");
      b.textContent = "PLAY AGAIN"; b.style.pointerEvents = "auto";
      b.onclick = () => { $("status").innerHTML = ""; $("bigmsg").style.opacity = 0; hostStart(); };
      $("status").appendChild(b);
    }, 2000);
  }
}

// ================= THREE.JS SCENE =================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000011, 20, 55);
const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function setupSeatView() {
  const pos = rotY(new THREE.Vector3(0, 2.2, R + 7.5), SEAT_ANGLE[mySeat]);
  camera.position.copy(pos);
  camera.lookAt(0, 0, 0);
}
setupSeatView();

scene.add(new THREE.AmbientLight(0x505070));
const pl = new THREE.PointLight(0xffffff, 1.1, 100); pl.position.set(0, 10, 0); scene.add(pl);
const ballLight = new THREE.PointLight(0xff00ff, 1.6, 14); scene.add(ballLight);

// arena wireframe
const arena = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.BoxGeometry(R*2, H*2, R*2)),
  new THREE.LineBasicMaterial({ color: 0x00ffff }));
scene.add(arena);
for (let i = 1; i < 4; i++) {   // inner depth rings
  const ring = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(R*2*i/4, H*2, R*2*i/4)),
    new THREE.LineBasicMaterial({ color: 0x003a4a }));
  scene.add(ring);
}
const grid = new THREE.GridHelper(44, 44, 0x224466, 0x0a1522);
grid.position.y = -H - 0.02; scene.add(grid);

// ball
const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(BALL_R, 24, 24),
  new THREE.MeshPhongMaterial({ color: 0xff00ff, emissive: 0xaa00aa }));
scene.add(ballMesh);
// trail
const trail = [];
for (let i = 0; i < 10; i++) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(BALL_R * (1 - i/12), 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.25 * (1 - i/10) }));
  scene.add(m); trail.push(m);
}

// paddles + face walls per seat
const padMeshes = [], faceWalls = [];
for (let s = 0; s < 4; s++) {
  const g = new THREE.Group();
  const mat = new THREE.MeshPhongMaterial({ color: SEAT_COLOR[s], transparent: true, opacity: 0.35, emissive: SEAT_COLOR[s], emissiveIntensity: 0.4, side: THREE.DoubleSide });
  g.add(new THREE.Mesh(new THREE.PlaneGeometry(PADDLE.w, PADDLE.h), mat));
  g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.PlaneGeometry(PADDLE.w, PADDLE.h)),
    new THREE.LineBasicMaterial({ color: SEAT_COLOR[s] })));
  g.rotation.y = SEAT_ANGLE[s];
  g.visible = false;
  scene.add(g); padMeshes.push(g);
  faceWalls.push(null);
}

function attachFace(seat, stream) {
  if (faceWalls[seat]) return;
  const v = document.createElement("video");
  v.autoplay = true; v.playsInline = true; v.muted = true;
  v.srcObject = stream; v.play().catch(()=>{});
  const tex = new THREE.VideoTexture(v);
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(R*2, H*2),
    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide }));
  wall.position.copy(rotY(new THREE.Vector3(0, 0, -(R + 0.05)), SEAT_ANGLE[seat] + Math.PI));
  wall.rotation.y = SEAT_ANGLE[seat] + Math.PI;
  wall.scale.x = -1;
  scene.add(wall);
  faceWalls[seat] = wall;
}

// ================= INPUT =================
const ray = new THREE.Raycaster();
addEventListener("mousemove", e => {
  if (phase !== "play" || lives[mySeat] <= 0) return;
  const m = new THREE.Vector2((e.clientX/innerWidth)*2 - 1, -(e.clientY/innerHeight)*2 + 1);
  ray.setFromCamera(m, camera);
  const n = rotY(new THREE.Vector3(0, 0, 1), SEAT_ANGLE[mySeat]);
  const plane = new THREE.Plane(n, -PAD_R);
  const pt = new THREE.Vector3();
  if (ray.ray.intersectPlane(plane, pt)) {
    const local = rotY(pt.clone(), -SEAT_ANGLE[mySeat]);
    myPad.u = THREE.MathUtils.clamp(local.x, -R + PADDLE.w/2, R - PADDLE.w/2);
    myPad.v = THREE.MathUtils.clamp(local.y, -H + PADDLE.h/2, H - PADDLE.h/2);
    pads[mySeat] = [myPad.u, myPad.v];
  }
});

// ================= PHYSICS (host only) =================
function physics(dt) {
  if (!ballLive) return;
  ball.addScaledVector(ballV, dt);
  if (Math.abs(ball.y) > H - BALL_R) { ballV.y *= -1; ball.y = Math.sign(ball.y)*(H - BALL_R); }

  for (let s = 0; s < 4; s++) {
    const lb = rotY(ball.clone(), -SEAT_ANGLE[s]);
    const lv = rotY(ballV.clone(), -SEAT_ANGLE[s]);
    if (lv.z <= 0) continue;
    const defended = seatActive(s) && lives[s] > 0;
    if (defended && lb.z > PAD_R - BALL_R) {
      const [pu, pv] = pads[s];
      if (Math.abs(lb.x - pu) < PADDLE.w/2 + BALL_R && Math.abs(lb.y - pv) < PADDLE.h/2 + BALL_R && lb.z < PAD_R + BALL_R*2) {
        lv.z = -Math.abs(lv.z) * 1.05;
        lv.x += (lb.x - pu) * 3;
        lv.y += (lb.y - pv) * 3;
        lb.z = PAD_R - BALL_R;
        ball.copy(rotY(lb, SEAT_ANGLE[s]));
        ballV.copy(rotY(lv, SEAT_ANGLE[s]));
        flash(); hostBroadcast({ t: "hit" });
        continue;
      }
      if (lb.z > R) {   // missed!
        lives[s] = Math.max(0, lives[s] - 1);
        renderHUD(); flash(); hostBroadcast({ t: "hit" });
        ballLive = false;
        const alive = players.filter(p => lives[p.seat] > 0);
        if (alive.length <= 1) {
          const winner = alive.length ? alive[0].seat : s;
          hostBroadcast({ t: "over", winner });
          gameOver(winner);
        } else setTimeout(serve, 1500);
        return;
      }
    } else if (!defended && lb.z > R - BALL_R) {   // empty/dead wall bounces
      lv.z = -Math.abs(lv.z);
      lb.z = R - BALL_R;
      ball.copy(rotY(lb, SEAT_ANGLE[s]));
      ballV.copy(rotY(lv, SEAT_ANGLE[s]));
    }
  }
}

// ================= LOOP =================
let last = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - last) / 1000, 0.05); last = now;

  if (phase === "play") {
    if (isHost) {
      physics(dt);
      hostBroadcast({ t: "s", pads, ball: [ball.x, ball.y, ball.z], live: ballLive, lives });
    } else if (conns.host?.open) {
      conns.host.send({ t: "p", u: myPad.u, v: myPad.v });
    }
  }

  for (let s = 0; s < 4; s++) {
    const show = (phase !== "lobby") && seatActive(s) && lives[s] > 0;
    padMeshes[s].visible = show;
    if (show) {
      const target = rotY(new THREE.Vector3(pads[s][0], pads[s][1], PAD_R), SEAT_ANGLE[s]);
      padMeshes[s].position.lerp(target, s === mySeat ? 0.6 : 0.35);
    }
  }

  ballMesh.visible = ballLive;
  if (ballLive) {
    for (let i = trail.length - 1; i > 0; i--) trail[i].position.copy(trail[i-1].position);
    trail[0].position.copy(ballMesh.position);
  }
  trail.forEach(m => m.visible = ballLive);
  ballMesh.position.copy(ball);
  ballLight.position.copy(ball);
  ballLight.intensity = ballLive ? 1.6 : 0;

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
